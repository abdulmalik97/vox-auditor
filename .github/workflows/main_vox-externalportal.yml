# .github/workflows/azure-webapp.yml
name: Build & deploy Next.js to Azure Web App – vox external portal

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # needed for checkout
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22 LTS
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Next.js
        run: yarn build # creates the .next folder

      # copy static assets into the bundle so Next can serve them
      - run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/ || true
          cp -r next.config.* .next/standalone/ || true

      # Bundle only what the server needs and PRESERVE symlinks (-y / --symlinks)
      - name: Package artifact # package just the standalone folder, preserving symlinks (-y)
        run: |
          cd .next/standalone
          zip -r --symlinks ../../site.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: site.zip # keep as .zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: .

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: vox-externalportal
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE}}
          package: site.zip # send the zip directly
